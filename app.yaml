runtime: nodejs24
entrypoint: node server.js
default_expiration: 3h

handlers:

  # API endpoints — must be routed to gunicorn before static handlers
  - url: /metric.json
    script: auto
    secure: always

  - url: /api/.*
    script: auto
    secure: always

  - url: /.well-known/(.*)
    static_files: public/static/well-known/\1
    upload: public/static/well-known/.*
    secure: always

  # Add longer caching for fonts
  - url: /static/fonts/(.*\.(woff|woff2))$
    static_files: public/static/fonts/\1
    upload: public/static/fonts/.*\.(woff|woff2)$
    secure: always
    expiration: 365d
    http_headers:
      strict-transport-security: max-age=31556926; includeSubDomains
      x-content-type-options: nosniff
      vary: Accept-Encoding

  - url: /static
    static_dir: public/static
    secure: always
    http_headers:
      strict-transport-security: max-age=31556926; includeSubDomains
      x-content-type-options: nosniff
      vary: Accept-Encoding

  # Serve Astro-built HTML pages as static files from dist/
  # Index page
  - url: /$
    static_files: dist/index.html
    upload: dist/index.html
    secure: always
    expiration: 1h
    http_headers:
      strict-transport-security: max-age=31556926; includeSubDomains
      x-content-type-options: nosniff
      content-security-policy: >-
        default-src 'self' https:;
        script-src 'self' https: 'unsafe-inline';
        style-src 'self' https: 'unsafe-inline';
        img-src 'self' https: data:;
        font-src 'self' https: data:;
        connect-src 'self' https:;
        frame-ancestors 'none'

  # Astro pages — serve /path as dist/path/index.html
  - url: /(.+)
    static_files: dist/\1/index.html
    upload: dist/.*/index\.html
    secure: always
    expiration: 1h
    http_headers:
      strict-transport-security: max-age=31556926; includeSubDomains
      x-content-type-options: nosniff
      content-security-policy: >-
        default-src 'self' https:;
        script-src 'self' https: 'unsafe-inline';
        style-src 'self' https: 'unsafe-inline';
        img-src 'self' https: data:;
        font-src 'self' https: data:;
        connect-src 'self' https:;
        frame-ancestors 'none'

  # Fallback: all remaining routes (legacy redirects, 404s, robots.txt, .well-known)
  - url: /.*
    script: auto
    secure: always
